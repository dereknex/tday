appId: com.tday.app
productName: Tday
directories:
  output: release/${version}
  buildResources: build
files:
  - out/**
  - package.json
  - "!**/{.DS_Store,.git,*.map}"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,readme}"
asar: true
asarUnpack:
  - "**/node_modules/node-pty/**/*"
extraResources:
  - from: resources/CoWorkers
    to: CoWorkers
    filter:
      - "**/*.md"
  - from: resources/CoWorkers.md
    to: CoWorkers.md
  - from: resources/pi-computer-use-bridge.ts
    to: pi-computer-use-bridge.ts

# ── macOS ──────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  extendInfo:
    NSLocalNetworkUsageDescription: "Tday needs local network access to connect to local AI models (e.g., LM Studio)."
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: "Tday-${version}-mac-${arch}.${ext}"
  # ── Signing ──────────────────────────────────────────────────────────────
  # Set CSC_IDENTITY_AUTO_DISCOVERY=false (local dev) to skip signing.
  # In CI, import a self-signed p12 cert (GitHub Secret: APPLE_CERT_P12_BASE64)
  # so all builds are signed with the same certificate fingerprint.
  # This makes macOS TCC track the app by cert fingerprint + Bundle ID instead
  # of CDHASH, so Accessibility/Screen Recording permissions persist across updates.
  #
  # To generate the cert once:
  #   openssl req -x509 -newkey rsa:4096 -keyout tday-sign.key -out tday-sign.crt \
  #     -days 3650 -nodes -subj "/CN=Tday Code Signing/O=Tday"
  #   openssl pkcs12 -export -out tday-sign.p12 -inkey tday-sign.key -in tday-sign.crt
  #   base64 -i tday-sign.p12  # → store as GitHub Secret APPLE_CERT_P12_BASE64
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # tday-nativecore MCP binary (built by cargo before packaging)
  extraResources:
    - from: ../../crates/tday-nativecore/target/release/tday-nativecore
      to: tday-nativecore

# ── Windows ────────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: "Tday-${version}-win-${arch}.${ext}"
  # tday-nativecore MCP binary
  extraResources:
    - from: ../../crates/tday-nativecore/target/release/tday-nativecore.exe
      to: tday-nativecore.exe

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Tday

# ── Linux ──────────────────────────────────────────────────────────────────────
linux:
  category: Development
  # tday-nativecore MCP binary
  extraResources:
    - from: ../../crates/tday-nativecore/target/release/tday-nativecore
      to: tday-nativecore
  executableName: Tday
  target:
    - target: AppImage
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
  artifactName: "Tday-${version}-linux-${arch}.${ext}"

# ── DMG (macOS only) ───────────────────────────────────────────────────────────
dmg:
  artifactName: "Tday-${version}-mac-${arch}.${ext}"
  writeUpdateInfo: false
